# Render Blueprint — defines services for one-click deploy.
# https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub.
#   2. https://dashboard.render.com -> New + -> Blueprint -> select repo.
#   3. Render reads this file and creates the web service automatically.
#   4. Fill in the secret env vars (marked sync: false) when prompted.

services:
  - type: web
    name: pal-institute-api
    runtime: python
    rootDir: backend                       # <- requirements.txt lives here
    plan: free
    buildCommand: pip install -r requirements.txt
    # FastAPI (ASGI) served via gunicorn + uvicorn worker.
    # Render injects PORT — bind to it.
    startCommand: gunicorn app:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 2 --timeout 90
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: MONGO_URI
        sync: false                        # set in Render dashboard (Atlas URI)
      - key: DB_NAME
        value: pal_institute
      - key: ADMIN_PASSWORD
        sync: false                        # set in Render dashboard
      - key: JWT_SECRET
        generateValue: true                # Render generates a strong random secret
      - key: CORS_ORIGINS
        sync: false                        # set to your Vercel URL(s)
